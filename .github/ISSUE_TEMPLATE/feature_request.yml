name: Feature request
description: Suggest a narrowly scoped improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests scoped to this Flutter app and avoid uploading personal images, secrets, or model binaries.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This does not require committing ONNX model binaries.
          required: true
        - label: This does not require publishing personal or identifiable sample images.
          required: true
        - label: This can be tested with public or synthetic inputs.
          required: true
